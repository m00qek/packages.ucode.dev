name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build packages (${{ matrix.sdk_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk_version: "24.10.6"
            feed_dir: "24.10"
          - sdk_version: "25.12.3"
            feed_dir: "25.12"
    steps:
      - uses: actions/checkout@v6

      - name: Build packages
        env:
          FEED_SIGNING_KEY: ${{ secrets.FEED_SIGNING_KEY }}
        run: |
          mkdir -p bin
          chmod 777 bin
          docker run --rm \
            -e FEED_SIGNING_KEY="${FEED_SIGNING_KEY}" \
            -v ${{ github.workspace }}/ucode-docopt:/builder/package/ucode-docopt:ro \
            -v ${{ github.workspace }}/ucode-utest:/builder/package/ucode-utest:ro \
            -v ${{ github.workspace }}/bin:/builder/bin \
            openwrt/sdk:x86-64-${{ matrix.sdk_version }} \
            sh -c "
              if [ -n \"\${FEED_SIGNING_KEY}\" ]; then
                printf '%s' \"\${FEED_SIGNING_KEY}\" > /builder/key-build
              else
                openssl genrsa -out /builder/key-build 2048 2>/dev/null
              fi &&
              openssl rsa -in /builder/key-build -pubout > /builder/key-build.pub 2>/dev/null &&
              ./scripts/feeds update base &&
              ./scripts/feeds install ucode &&
              make defconfig &&
              make package/ucode-docopt/compile package/ucode-utest/compile V=s
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.feed_dir }}
          path: bin/packages/x86_64/base/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download 24.10 artifacts
        uses: actions/download-artifact@v8
        with:
          name: packages-24.10
          path: staging/24.10

      - name: Download 25.12 artifacts
        uses: actions/download-artifact@v8
        with:
          name: packages-25.12
          path: staging/25.12

      - name: Copy new packages
        run: |
          mkdir -p 24.10 25.12
          find staging/24.10 -name "*.ipk" -exec cp -n {} 24.10/ \;
          find staging/25.12 -name "*.apk" -exec cp -n {} 25.12/ \;

      - name: Regenerate 24.10 index
        run: |
          chmod 777 24.10
          docker run --rm \
            -v ${{ github.workspace }}/24.10:/pkgs \
            openwrt/sdk:x86-64-24.10.6 \
            sh -c "/builder/scripts/ipkg-make-index.sh /pkgs > /pkgs/Packages && gzip -9 -k /pkgs/Packages"

      - name: Regenerate 25.12 index
        env:
          FEED_SIGNING_KEY: ${{ secrets.FEED_SIGNING_KEY }}
        run: |
          chmod 777 25.12
          docker run --rm \
            -e FEED_SIGNING_KEY="${FEED_SIGNING_KEY}" \
            -v ${{ github.workspace }}/25.12:/pkgs \
            openwrt/sdk:x86-64-25.12.3 \
            sh -c "
              if [ -n \"\${FEED_SIGNING_KEY}\" ]; then
                printf '%s' \"\${FEED_SIGNING_KEY}\" > /builder/key-build
              else
                openssl genrsa -out /builder/key-build 2048 2>/dev/null
              fi &&
              openssl rsa -in /builder/key-build -pubout > /builder/key-build.pub 2>/dev/null &&
              cp /builder/key-build.pub /etc/apk/keys/ &&
              /builder/staging_dir/host/bin/apk mkndx -o /pkgs/APKINDEX.tar.gz /pkgs/*.apk ||
              echo 'Warning: APKINDEX generation failed'
            "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 24.10/ 25.12/
          git diff --cached --quiet || git commit -m "chore: deploy packages from ${GITHUB_SHA::8}"
          git push
