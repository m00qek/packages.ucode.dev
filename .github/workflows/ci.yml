name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build packages (${{ matrix.sdk_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk_version: "24.10.6"
            feed_dir: "24.10"
          - sdk_version: "25.12.3"
            feed_dir: "25.12"
    steps:
      - uses: actions/checkout@v6

      - name: Build packages
        run: |
          mkdir -p bin
          chmod 777 bin
          docker run --rm \
            -v ${{ github.workspace }}/ucode-docopt:/builder/package/ucode-docopt:ro \
            -v ${{ github.workspace }}/ucode-utest:/builder/package/ucode-utest:ro \
            -v ${{ github.workspace }}/bin:/builder/bin \
            openwrt/sdk:x86-64-${{ matrix.sdk_version }} \
            sh -c "
              ./scripts/feeds update base &&
              ./scripts/feeds install ucode &&
              make defconfig &&
              make package/ucode-docopt/compile package/ucode-utest/compile V=s
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.feed_dir }}
          path: bin/packages/x86_64/base/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download 24.10 artifacts
        uses: actions/download-artifact@v8
        with:
          name: packages-24.10
          path: staging/24.10

      - name: Download 25.12 artifacts
        uses: actions/download-artifact@v8
        with:
          name: packages-25.12
          path: staging/25.12

      - name: Copy new packages
        run: |
          mkdir -p 24.10 25.12/x86_64 25.12/noarch
          find staging/24.10 \( -name "ucode-docopt_*.ipk" -o -name "ucode-utest_*.ipk" \) -exec cp -n {} 24.10/ \;
          find staging/25.12 \( -name "ucode-docopt-*.apk" -o -name "ucode-utest-*.apk" \) -exec cp -n {} 25.12/x86_64/ \;

      - name: Sort and sign 25.12 packages
        env:
          APK_FEED_SIGNING_KEY: ${{ secrets.APK_FEED_SIGNING_KEY }}
        run: |
          chmod 777 25.12/x86_64 25.12/noarch
          if [ -n "$APK_FEED_SIGNING_KEY" ]; then
            printf '%s' "$APK_FEED_SIGNING_KEY" > /tmp/apk.key
          fi
          docker run --rm \
            $([ -f /tmp/apk.key ] && echo "-v /tmp/apk.key:/apk.key:ro") \
            -v ${{ github.workspace }}/25.12/x86_64:/x86_64 \
            -v ${{ github.workspace }}/25.12/noarch:/noarch \
            openwrt/sdk:x86-64-25.12.3 \
            sh -c "
              if [ -f /apk.key ]; then
                for pkg in /x86_64/*.apk; do
                  /builder/staging_dir/host/bin/apk adbsign \
                    --allow-untrusted --reset-signatures \
                    --sign-key /apk.key \"\$pkg\" 2>/dev/null
                done
              fi
              for pkg in /x86_64/*.apk; do
                arch=\$(/builder/staging_dir/host/bin/apk adbdump \"\$pkg\" 2>/dev/null | awk '/^ *arch:/{print \$2}')
                if [ \"\$arch\" = noarch ]; then
                  cp \"\$pkg\" /noarch/
                fi
              done
            "
          rm -f /tmp/apk.key

      - name: Regenerate 24.10 index
        run: |
          chmod -R 777 24.10
          docker run --rm \
            -v ${{ github.workspace }}/24.10:/pkgs \
            openwrt/sdk:x86-64-24.10.6 \
            sh -c "/builder/scripts/ipkg-make-index.sh /pkgs > /pkgs/Packages && gzip -9c /pkgs/Packages > /pkgs/Packages.gz"

      - name: Regenerate 25.12 index
        run: |
          chmod 777 25.12/x86_64
          docker run --rm \
            -v ${{ github.workspace }}/25.12/x86_64:/pkgs \
            openwrt/sdk:x86-64-25.12.3 \
            sh -c "
              /builder/staging_dir/host/bin/apk mkndx --allow-untrusted -o /pkgs/APKINDEX.tar.gz /pkgs/*.apk ||
              echo 'Warning: APKINDEX generation failed'
            "

      - name: Sign 25.12 index
        env:
          APK_FEED_SIGNING_KEY: ${{ secrets.APK_FEED_SIGNING_KEY }}
        run: |
          git show origin/main:apk.pub > 25.12/feed.pub.pem
          if [ -n "$APK_FEED_SIGNING_KEY" ]; then
            chmod 777 25.12/x86_64
            printf '%s' "$APK_FEED_SIGNING_KEY" > /tmp/apk.key
            docker run --rm \
              -v /tmp/apk.key:/apk.key:ro \
              -v ${{ github.workspace }}/25.12/x86_64:/pkgs \
              openwrt/sdk:x86-64-25.12.3 \
              /builder/staging_dir/host/bin/apk adbsign \
                --allow-untrusted --reset-signatures \
                --sign-key /apk.key /pkgs/APKINDEX.tar.gz
            rm /tmp/apk.key
          fi

      - name: Sign 24.10 index
        env:
          OPKG_FEED_SIGNING_KEY: ${{ secrets.OPKG_FEED_SIGNING_KEY }}
        run: |
          git show origin/main:opkg.pub > 24.10/feed.pub
          if [ -n "$OPKG_FEED_SIGNING_KEY" ]; then
            chmod -R 777 24.10
            printf '%s' "$OPKG_FEED_SIGNING_KEY" > /tmp/opkg.key
            docker run --rm \
              -v /tmp/opkg.key:/opkg.key:ro \
              -v ${{ github.workspace }}/24.10:/pkgs \
              openwrt/sdk:x86-64-24.10.6 \
              /builder/staging_dir/host/bin/usign -S -m /pkgs/Packages -s /opkg.key -x /pkgs/Packages.sig
            rm /tmp/opkg.key
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 24.10/ 25.12/
          git diff --cached --quiet || git commit -m "chore: deploy packages from ${GITHUB_SHA::8}"
          git push
